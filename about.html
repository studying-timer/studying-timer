<h1>Task Rouletteとは</h1>

<p>
Task Rouletteは、ランダムにタスクを決めることができる
シンプルな作業支援ツールです。
</p>

<p>
勉強、仕事、家事など
「何をやるか迷ったとき」に
ランダムで行動を決定できます。
</p>

<p>
このツールはブラウザ内で動作し、
タスク設定はLocalStorageに保存されます。
</p>

<a href="/">ツールへ戻る</a>

</body>
