<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studying Timer</title>
    <style>
        :root {
            /* ダークモード視認性改善：純粋な黒(#000)ではなく、要素が判別できる暗灰色に設定 */
            --bg: #0d1117; 
            --card: #161b22;
            --text: #c9d1d9;
            --sub: #58a6ff;
            --border: #30363d;
            --timer-color: #39ff14;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ログイン時用ヘッダー */
        #header-area {
            width: 100%;
            height: 150px;
            background-color: var(--card);
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            padding: 15px;
            box-sizing: border-box;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }

        #current-crown-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        /* タイマー（グロー廃止・従来デザイン） */
        #timer-display {
            font-size: 80px;
            font-family: 'Consolas', monospace;
            color: var(--timer-color);
            margin: 40px 0;
            font-weight: bold;
        }

        /* ゲージ */
        .gauge-container {
            width: 80%;
            height: 12px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #gauge-fill {
            height: 100%;
            background: var(--sub);
            width: 0%;
            transition: width 0.3s;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        button {
            padding: 12px 24px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #recovery-btn {
            background: #d29922;
            color: #000;
            border: none;
        }

        /* 王冠選択エリア */
        #crown-selection {
            display: none;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: var(--card);
            border-radius: 10px;
        }
        .crown-item {
            width: 45px;
            height: 45px;
            cursor: pointer;
            opacity: 0.2;
            transition: 0.2s;
        }
        .crown-item.unlocked { opacity: 1; }
        .crown-item.active { border: 2px solid var(--sub); border-radius: 5px; }

        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 25px;
            border: 1px solid var(--sub);
            border-radius: 12px;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

<div id="header-area">
    <div class="user-info">
        <img id="current-crown-img" src="crown_0.png">
        <div>
            <div id="display-lv" style="font-weight: bold;">Lv. 0</div>
            <button onclick="openHeaderSettings()" style="padding: 2px 5px; font-size: 0.7rem;">ヘッダー変更</button>
        </div>
    </div>
</div>

<div id="timer-display">00:00:00</div>

<div class="gauge-container">
    <div id="gauge-fill"></div>
</div>

<div class="stats-row">
    <div>継続: <span id="streak-days">0</span>日</div>
    <div>回復券: <span id="ticket-count">0</span>枚</div>
</div>

<div style="display: flex; gap: 10px;">
    <button onclick="toggleTimer()" id="main-btn">START</button>
    <button id="recovery-btn" onclick="useRecoveryTicket()" style="display: none;">回復券を使用</button>
    <button onclick="toggleCrownMenu()">王冠変更</button>
</div>

<div id="crown-selection"></div>

<div id="header-modal" class="modal">
    <h3>ヘッダー画像URL</h3>
    <input type="text" id="header-url-input" style="width: 100%; margin-bottom: 10px;">
    <button onclick="saveHeader()">保存</button>
    <button onclick="this.parentElement.style.display='none'">閉じる</button>
</div>

<script>
    // データ構造
    let userData = JSON.parse(localStorage.getItem('study_timer_data')) || {
        totalSec: 0,
        streak: 0,
        tickets: 0,
        lastDate: "", // 最後に完了した日付
        activeCrown: 0,
        headerUrl: ""
    };

    let timer;
    let isRunning = false;

    // --- 計算式: Lv100 = 4000時間 (14,400,000秒) ---
    // 秒数 = 1440 * Lv^2
    function calcLv(sec) { return Math.floor(Math.sqrt(sec / 1440)); }
    function expForLv(lv) { return 1440 * (lv ** 2); }

    function updateUI() {
        const lv = calcLv(userData.totalSec);
        const nextExp = expForLv(lv + 1);
        const prevExp = expForLv(lv);
        const progress = ((userData.totalSec - prevExp) / (nextExp - prevExp)) * 100;

        document.getElementById('display-lv').innerText = "Lv. " + lv;
        document.getElementById('gauge-fill').style.width = progress + "%";
        document.getElementById('streak-days').innerText = userData.streak;
        document.getElementById('ticket-count').innerText = userData.tickets;
        document.getElementById('current-crown-img').src = `crown_${userData.activeCrown}.png`;
        
        if(userData.headerUrl) {
            document.getElementById('header-area').style.backgroundImage = `url(${userData.headerUrl})`;
        }

        // 救済ボタン表示判定
        checkRecoveryEligibility();
    }

    function toggleTimer() {
        if(!isRunning) {
            isRunning = true;
            document.getElementById('main-btn').innerText = "STOP";
            timer = setInterval(() => {
                userData.totalSec++;
                renderTime();
                if(userData.totalSec % 10 === 0) updateUI(); // 10秒毎にUI更新
            }, 1000);
        } else {
            clearInterval(timer);
            isRunning = false;
            document.getElementById('main-btn').innerText = "START";
            checkDailyCompletion();
            saveData();
        }
    }

    function renderTime() {
        let h = Math.floor(userData.totalSec / 3600).toString().padStart(2, '0');
        let m = Math.floor((userData.totalSec % 3600) / 60).toString().padStart(2, '0');
        let s = (userData.totalSec % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
    }

    // 継続・救済ロジック
    function checkDailyCompletion() {
        const today = new Date().toLocaleDateString();
        if (userData.lastDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (userData.lastDate === yesterday.toLocaleDateString()) {
                userData.streak++;
                // 10日ごとに回復券配布
                if (userData.streak % 10 === 0) userData.tickets++;
            } else if (!userData.lastDate) {
                userData.streak = 1;
            }
            userData.lastDate = today;
        }
    }

    function checkRecoveryEligibility() {
        const today = new Date();
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const dayBeforeYest = new Date();
        dayBeforeYest.setDate(dayBeforeYest.getDate() - 2);

        // A日(一昨々日以前)完了、B日(昨日)未完了、C日(今日)実行中の時、券があれば復活可能
        const btn = document.getElementById('recovery-btn');
        if (userData.tickets > 0 && userData.lastDate === dayBeforeYest.toLocaleDateString()) {
            btn.style.display = "block";
        } else {
            btn.style.display = "none";
        }
    }

    function useRecoveryTicket() {
        userData.tickets--;
        userData.streak += 1; // B日分を補填
        userData.lastDate = new Date().toLocaleDateString();
        saveData();
        updateUI();
        alert("継続日数を復元しました。");
    }

    // 王冠（10種類生成・選択）
    function toggleCrownMenu() {
        const menu = document.getElementById('crown-selection');
        menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
        menu.innerHTML = "";
        const lv = calcLv(userData.totalSec);

        for(let i=0; i<10; i++) {
            const img = document.createElement('img');
            img.src = `crown_${i}.png`;
            img.className = "crown-item" + (lv >= i*10 ? " unlocked" : "") + (userData.activeCrown === i ? " active" : "");
            img.onclick = () => {
                if(lv >= i*10) {
                    userData.activeCrown = i;
                    saveData();
                    updateUI();
                }
            };
            menu.appendChild(img);
        }
    }

    function openHeaderSettings() { document.getElementById('header-modal').style.display = 'block'; }
    function saveHeader() {
        userData.headerUrl = document.getElementById('header-url-input').value;
        document.getElementById('header-modal').style.display = 'none';
        saveData();
        updateUI();
    }

    function saveData() { localStorage.setItem('study_timer_data', JSON.stringify(userData)); }

    window.onload = () => {
        renderTime();
        updateUI();
    };
</script>

</body>
</html>
