<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studying Timer - Celestial Edition</title>
    <style>
        :root {
            /* Celestial Theme Colors */
            --bg-deep: #05070a;
            --bg-nebula: radial-gradient(circle at center, #0a111a 0%, #05070a 100%);
            --accent-gold: #d4af37;
            --accent-blue: #4a90e2;
            --text-main: #e0e6ed;
            --text-sub: #a0aec0;
            --card-bg: rgba(20, 26, 35, 0.8);
            --border-color: #2d3748;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-nebula);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header & User Info */
        header {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            background-color: #1a202c;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .equipped-crown {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        /* Timer Display (Traditional Style - No Glow) */
        .timer-container {
            text-align: center;
            margin: 40px 0;
        }

        #timer {
            font-size: 5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            margin: 10px 0;
        }

        .progress-bar-container {
            width: 300px;
            height: 8px;
            background: #2d3748;
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-blue);
            transition: width 0.3s ease;
        }

        /* Main UI */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
        }

        /* Buttons */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .btn-start { background: var(--accent-blue); color: white; }
        .btn-stop { background: #e53e3e; color: white; }
        .btn-recovery { background: var(--accent-gold); color: black; display: none; }

        /* Crown Inventory Modal */
        #inventory-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border: 1px solid var(--accent-gold);
            padding: 20px;
            border-radius: 20px;
            z-index: 100;
            width: 85%;
            max-width: 400px;
        }

        .crown-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .crown-item {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid transparent;
            cursor: pointer;
            opacity: 0.3;
        }

        .crown-item.unlocked { opacity: 1; border-color: var(--border-color); }
        .crown-item.selected { border-color: var(--accent-gold); background: rgba(212, 175, 55, 0.2); }

    </style>
</head>
<body>

    <header id="user-header">
        <div class="user-profile">
            <img src="" id="current-crown-img" class="equipped-crown" alt="Crown">
            <div>
                <div id="user-name">User</div>
                <div id="user-level">Lv. 1</div>
            </div>
        </div>
    </header>

    <div class="timer-container">
        <div id="timer">00:00:00</div>
        <div class="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
        <div id="total-time-display">Total: 0h</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div>継続日数</div>
            <div id="streak-count" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div>回復券</div>
            <div id="ticket-count" class="stat-value">0</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn-start" onclick="toggleTimer()">START</button>
        <button id="recoveryBtn" class="btn-recovery" onclick="useRecoveryTicket()">継続を復活させる</button>
        <button onclick="toggleInventory()">王冠選択</button>
    </div>

    <div id="inventory-modal">
        <h3>王冠コレクション</h3>
        <div class="crown-grid" id="crown-list"></div>
        <button onclick="toggleInventory()" style="margin-top: 20px; width: 100%;">閉じる</button>
    </div>

    <script>
        // --- DATA STRUCTURE ---
        let state = {
            totalSeconds: 0,
            currentStreak: 0,
            recoveryTickets: 0,
            lastDate: null,
            isTimerRunning: false,
            elapsedToday: 0,
            unlockedCrowns: [0], // 初期配布
            selectedCrown: 0,
            headerImage: null
        };

        let timerInterval;
        const CROWN_NAMES = ["Cyber", "Celestial", "Stardust", "Steampunk", "Pastel", "Prism", "Obsidian", "Glitch", "Pearl", "Vortex"];

        // --- CALCULATION (Lv.100 = 4000h) ---
        // S = 1440 * (Level^2) -> Level 100 = 14,400,000s = 4000h
        function getLevel(seconds) {
            return Math.floor(Math.sqrt(seconds / 1440));
        }

        function getSecondsForLevel(lv) {
            return 1440 * (lv ** 2);
        }

        // --- CORE LOGIC ---
        function updateUI() {
            const lv = getLevel(state.totalSeconds);
            const nextLvSec = getSecondsForLevel(lv + 1);
            const currentLvSec = getSecondsForLevel(lv);
            const progress = ((state.totalSeconds - currentLvSec) / (nextLvSec - currentLvSec)) * 100;

            document.getElementById('user-level').innerText = `Lv. ${lv}`;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('total-time-display').innerText = `Total: ${Math.floor(state.totalSeconds / 3600)}h`;
            document.getElementById('streak-count').innerText = state.currentStreak;
            document.getElementById('ticket-count').innerText = state.recoveryTickets;
            
            // Header
            if(state.headerImage) {
                document.getElementById('user-header').style.backgroundImage = `url(${state.headerImage})`;
            }
            
            // Crown
            document.getElementById('current-crown-img').src = `crown_${state.selectedCrown}.png`;

            // Recovery Button Visibility
            checkRecoveryAvailable();
        }

        function toggleTimer() {
            if (state.isTimerRunning) {
                clearInterval(timerInterval);
                state.isTimerRunning = false;
                document.getElementById('startBtn').innerText = 'START';
                saveData();
            } else {
                state.isTimerRunning = true;
                document.getElementById('startBtn').innerText = 'STOP';
                timerInterval = setInterval(() => {
                    state.totalSeconds++;
                    state.elapsedToday++;
                    updateTimerDisplay();
                    if(state.totalSeconds % 3600 === 0) updateUI(); // 1時間ごとにUI更新
                }, 1000);
            }
        }

        function updateTimerDisplay() {
            const h = Math.floor(state.totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((state.totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (state.totalSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }

        // --- STREAK & TICKET LOGIC ---
        function checkDailyLogin() {
            const today = new Date().toDateString();
            if (state.lastDate === null) {
                state.lastDate = today;
                state.currentStreak = 1;
            } else if (state.lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (state.lastDate === yesterday.toDateString()) {
                    state.currentStreak++;
                    // 10日ごとに回復券付与
                    if (state.currentStreak % 10 === 0) {
                        state.recoveryTickets++;
                        alert("10日間継続達成！継続回復券を配布しました。");
                    }
                } else {
                    // 継続途切れ判定
                    checkRecoveryAvailable();
                }
                state.lastDate = today;
            }
            saveData();
            updateUI();
        }

        function checkRecoveryAvailable() {
            const btn = document.getElementById('recoveryBtn');
            const today = new Date();
            const lastDateObj = new Date(state.lastDate);
            const diffDays = Math.floor((today - lastDateObj) / (1000 * 60 * 60 * 24));

            // 「昨日できなかった（一昨日はやっていた）」かつ「今日完了した」時に表示
            if (diffDays === 2 && state.recoveryTickets > 0) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }

        function useRecoveryTicket() {
            if (state.recoveryTickets > 0) {
                state.recoveryTickets--;
                state.currentStreak += 1; // 穴埋め分を追加
                alert("回復券を使用しました。継続日数を復活させました！");
                updateUI();
                saveData();
            }
        }

        // --- INVENTORY ---
        function toggleInventory() {
            const modal = document.getElementById('inventory-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
            renderCrownList();
        }

        function renderCrownList() {
            const list = document.getElementById('crown-list');
            list.innerHTML = '';
            const lv = getLevel(state.totalSeconds);

            for (let i = 0; i < 10; i++) {
                const item = document.createElement('img');
                item.src = `crown_${i}.png`;
                item.className = 'crown-item';
                
                // 解放条件（例：10レベルごと）
                if (lv >= i * 10) {
                    item.classList.add('unlocked');
                    item.onclick = () => {
                        state.selectedCrown = i;
                        saveData();
                        updateUI();
                        toggleInventory();
                    };
                }
                if (state.selectedCrown === i) item.classList.add('selected');
                list.appendChild(item);
            }
        }

        // --- DATA PERSISTENCE ---
        function saveData() {
            localStorage.setItem('studyTimer_state', JSON.stringify(state));
        }

        function loadData() {
            const saved = localStorage.getItem('studyTimer_state');
            if (saved) {
                state = JSON.parse(saved);
                updateUI();
                updateTimerDisplay();
            }
        }

        // Initialize
        window.onload = () => {
            loadData();
            checkDailyLogin();
        };

        // ログイン時のヘッダー画像設定（模擬機能）
        function setHeaderImage(url) {
            state.headerImage = url;
            saveData();
            updateUI();
        }
    </script>
</body>
</html>
